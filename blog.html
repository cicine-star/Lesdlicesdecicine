<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<title>Blog — Les Douceurs de Cicine</title>
<style>
:root{--fond:#FBE9E7;--fond2:#F5DCDA;--carte:#FEF1EF;--blanc:#FFFFFF;--bordure:#EDD5D2;--brun:#5C2E0E;--caramel:#A0522D;--rose:#E8407A;--texte:#2A1A14;--doux:#6B4C42;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Lato",sans-serif;background:var(--fond);color:var(--texte);font-size:17px;}
nav{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1.5px solid var(--bordure);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 2px 8px rgba(92,46,14,.07);}
.nav-logo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:var(--brun);text-decoration:none;}
.nav-panier{position:relative;background:var(--caramel);color:#fff;border-radius:30px;padding:8px 16px;font-weight:700;font-size:.8rem;text-decoration:none;}
.cart-badge{position:absolute;top:-6px;right:-6px;background:var(--rose);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.62rem;font-weight:700;display:none;align-items:center;justify-content:center;}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px;}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--caramel);font-weight:700;font-size:.82rem;text-decoration:none;margin-bottom:18px;}
.page-title{font-family:"Dancing Script",cursive;font-size:2.2rem;color:var(--brun);margin-bottom:4px;}
.page-sub{font-size:.84rem;color:var(--doux);margin-bottom:20px;}
.hdiv{display:flex;align-items:center;gap:8px;margin:0 0 20px;}
.hdiv hr{flex:1;border:none;border-top:1.5px solid var(--rose);opacity:.35;}
.hdiv span{color:var(--rose);}
.post-card{background:#fff;border:1.5px solid var(--bordure);border-radius:16px;padding:20px 18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(92,46,14,.05);}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-emoji{font-size:1.8rem;flex-shrink:0;}
.post-meta{flex:1;}
.post-title{font-family:"Dancing Script",cursive;font-size:1.35rem;color:var(--brun);line-height:1.2;}
.post-date{font-size:.72rem;color:var(--doux);margin-top:3px;}
.post-content{font-size:.87rem;color:var(--texte);line-height:1.75;white-space:pre-line;}
.empty-blog{text-align:center;padding:40px 20px;font-size:.88rem;color:var(--doux);font-style:italic;}
.loading{text-align:center;padding:30px;font-size:.85rem;color:var(--doux);}
footer{background:var(--brun);color:#e8d5c8;padding:28px 16px 20px;text-align:center;margin-top:20px;}
.flogo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:#f0e0d6;margin-bottom:8px;}
footer p{font-size:.77rem;color:#c4a898;margin-bottom:4px;}
.flinks{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0;}
.flink{color:#e8d5c8;font-size:.75rem;text-decoration:none;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:20px;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Les Douceurs de Cicine</a>

<div class="wrap">

  <p class="page-sub">Actualités, conseils et coulisses de ma cuisine 💕</p>
  <div class="hdiv"><hr/><span>♡</span><hr/></div>

  <div id="blogList"><div class="loading">Chargement des articles…</div></div>
</div>

<footer>
  <div class="flogo">Les Douceurs de Cicine</div>
  <div class="flinks">
    <a href="https://www.instagram.com/lesdelices_de_cicine?igsh=MXEzYXJjYmozcjhsbQ%3D%3D&utm_source=qr" class="flink" target="_blank" rel="noopener">📸 Instagram</a>
    <a href="https://www.facebook.com/profile.php?id=61586132193455" class="flink" target="_blank" rel="noopener">👍 Facebook</a>
    <a href="https://snapchat.com/t/KKWM8AMZ" class="flink" target="_blank" rel="noopener">👻 Snapchat</a>
    <a href="https://wa.me/596696111440" class="flink" target="_blank">💬 WhatsApp</a>
  </div>
  <p>📍 Le Vauclin, Martinique · 0696 11 14 40</p>
  <p>© 2026 Les Douceurs de Cicine — Fait avec ❤️</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  try{
    var g=JSON.parse(localStorage.getItem("groupes")||"[]");
    var n=g.length;
    if(n>0){var b=document.getElementById("cartBadge");b.textContent=n>9?"9+":n;b.style.display="flex";}
  }catch(e){}
})();

var SB_URL="https://uousxxvrgcyvyaahdtda.supabase.co";
var SB_KEY="sb_publishable_MhxgfdKYdDI6NHLszuXl5A_3B4sOplm";
var sb=supabase.createClient(SB_URL,SB_KEY);

function fmtDate(ts){
  if(!ts)return"";
  var d=new Date(ts);
  var months=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();
}

async function loadBlog(){
  var el=document.getElementById("blogList");
  try{
    var {data,error}=await sb.from("blog_posts").select("*").eq("published",true).order("created_at",{ascending:false});
    if(error)throw error;
    var posts=data||[];
    if(posts.length===0){
      el.innerHTML='<div class="empty-blog">Aucun article pour l\'instant.<br/>Revenez bientôt pour découvrir les coulisses de ma cuisine ✨</div>';
      return;
    }
    var html="";
    posts.forEach(function(p){
      html+='<div class="post-card">'+
        '<div class="post-header">'+
        '<span class="post-emoji">'+(p.emoji||"🧁")+'</span>'+
        '<div class="post-meta">'+
        '<div class="post-title">'+p.title+'</div>'+
        '<div class="post-date">'+fmtDate(p.created_at)+'</div>'+
        '</div></div>'+
        '<p class="post-content">'+p.content.replace(/</g,"&lt;")+'</p>'+
        '</div>';
    });
    el.innerHTML=html;
  }catch(e){
    el.innerHTML='<div class="empty-blog">Les articles arrivent bientôt… ✨</div>';
  }
}

loadBlog();
</script>

</body>
