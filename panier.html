<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root{--fond:#FBE9E7;--fond2:#F5DCDA;--carte:#FEF1EF;--blanc:#FFFFFF;--bordure:#EDD5D2;--brun:#5C2E0E;--caramel:#A0522D;--c2:#7A3B1E;--texte:#2A1A14;--doux:#6B4C42;--fuchsia:#E8407A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Lato",sans-serif;background:var(--fond);color:var(--texte);}
nav{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1.5px solid var(--bordure);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 2px 8px rgba(92,46,14,.07);}
.nav-logo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:var(--brun);text-decoration:none;}
.nav-panier{background:var(--caramel);color:#fff;border-radius:30px;padding:8px 16px;font-weight:700;font-size:.8rem;text-decoration:none;}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px;}
.btn{display:block;width:100%;font-weight:700;font-size:.9rem;padding:14px;border-radius:40px;cursor:pointer;border:none;text-align:center;margin-bottom:10px;text-decoration:none;}
.btn-c{background:var(--caramel);color:#fff;}
.btn-b{background:var(--brun);color:#fff;}
.btn-o{background:transparent;color:var(--brun);border:2px solid var(--brun);}
.btn-wa{background:#25D366;color:#fff;}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--caramel);font-weight:700;font-size:.82rem;text-decoration:none;margin-bottom:18px;}
.title{font-family:"Dancing Script",cursive;font-size:2.2rem;color:var(--brun);margin-bottom:4px;}
.sub{font-size:.84rem;color:var(--doux);margin-bottom:18px;}
.hdiv{display:flex;align-items:center;gap:8px;margin:10px 0 16px;}
.hdiv hr{flex:1;border:none;border-top:1px solid var(--fuchsia);opacity:.5;}
.hdiv span{color:var(--fuchsia);}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:.75rem;font-weight:700;color:var(--texte);margin-bottom:4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bordure);border-radius:9px;font-family:"Lato",sans-serif;font-size:.84rem;color:var(--texte);background:var(--fond);outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--caramel);}
.fg textarea{resize:vertical;min-height:65px;}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fnote{font-size:.72rem;color:var(--caramel);background:var(--carte);border-left:3px solid var(--caramel);padding:7px 10px;border-radius:0 7px 7px 0;margin-bottom:10px;}
footer{background:var(--brun);color:#e8d5c8;padding:28px 16px 20px;text-align:center;margin-top:20px;}
.flogo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:#f0e0d6;margin-bottom:8px;}
footer p{font-size:.77rem;color:#c4a898;margin-bottom:4px;}
.flinks{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0;}
.flink{color:#e8d5c8;font-size:.75rem;text-decoration:none;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:20px;}
@media(max-width:400px){.fgr{grid-template-columns:1fr;}}
</style><title>Panier</title>
<style>
.pi{background:#fff;border:1px solid var(--bordure);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.pn{font-weight:700;color:var(--brun);font-size:.85rem;}
.pd{font-size:.74rem;color:var(--doux);}
.ps{font-weight:700;color:var(--caramel);font-size:.88rem;}
.brm{background:none;border:none;color:#cc4444;font-size:.72rem;cursor:pointer;text-decoration:underline;margin-top:3px;display:block;}
.gt{background:var(--carte);border:1.5px solid var(--bordure);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;font-weight:700;font-size:.95rem;color:var(--brun);margin:12px 0;}
.pf{background:#fff;border:1.5px solid var(--bordure);border-radius:12px;padding:18px;margin-bottom:14px;}
.pf h3{font-family:"Dancing Script",cursive;font-size:1.3rem;color:var(--brun);margin-bottom:12px;}
</style></head><body>
<nav><a class="nav-logo" href="index.html">Les D&eacute;lices de Cicine</a><a class="nav-panier" href="panier.html">&#128722; Panier</a></nav>
<div class="wrap">
<a href="index.html" class="back">&#8592; Accueil</a>
<h2 class="title">Mon panier</h2>
<div id="pC"></div>
</div>
<script>
function f(n){return n.toFixed(2).replace(".",",")+"€";}
function load(){
var p=JSON.parse(localStorage.getItem("panier")||"[]");
var el=document.getElementById("pC");
if(!p.length){el.innerHTML='<p style="text-align:center;padding:30px 0;color:var(--doux);">Votre panier est vide.<br/><br/><a href="commander.html" class="btn btn-c" style="width:auto;display:inline-block;padding:12px 24px;">🧁 Commander</a></p>';return;}
var tot=0,h="";
p.forEach(function(x,i){var s=x.price*x.qty;tot+=s;h+='<div class="pi"><div><div class="pn">'+x.name+'</div><div class="pd">'+x.qty+" × "+f(x.price)+'</div><button class="brm" onclick="rm('+i+')">&#10005; Retirer</button></div><span class="ps">'+f(s)+'</span></div>';});
h+='<div class="gt"><span>Total estimé</span><span>'+f(tot)+'</span></div>';
h+='<div class="pf"><h3>Vos informations</h3><div class="fnote">💬 Aucun paiement sur le site — lien SumUp envoyé après échange WhatsApp</div><div class="fgr"><div class="fg"><label>Prénom</label><input type="text" id="p1" placeholder="Prénom"/></div><div class="fg"><label>Nom</label><input type="text" id="p2" placeholder="Nom"/></div></div><div class="fg"><label>WhatsApp</label><input type="tel" id="p3" placeholder="0696 XX XX XX"/></div><div class="fg"><label>Date souhaitée</label><input type="date" id="p4"/></div><div class="fg"><label>Récupération</label><select id="p5"><option>📍 Retrait Vauclin</option><option>🚚 Livraison 7h30-19h30</option></select></div><div class="fg"><label>Précisions</label><textarea id="p6" placeholder="Allergies, adresse..."></textarea></div><button class="btn btn-wa" onclick="sWA()">&#128241; Envoyer sur WhatsApp</button></div>';
el.innerHTML=h;
}
function rm(i){var p=JSON.parse(localStorage.getItem("panier")||"[]");p.splice(i,1);localStorage.setItem("panier",JSON.stringify(p));load();}
function sWA(){
var p=JSON.parse(localStorage.getItem("panier")||"[]");
var pr=document.getElementById("p1").value;
if(!pr){alert("Entrez votre prénom.");return;}
var nom=pr+" "+document.getElementById("p2").value;
var tot=0,det="";
p.forEach(function(x){var s=x.price*x.qty;tot+=s;det+="• "+x.qty+"× "+x.name+" — "+f(x.price)+" × "+x.qty+" = "+f(s)+"
";});
var tel=document.getElementById("p3").value,dt=document.getElementById("p4").value,rc=document.getElementById("p5").value,mg=document.getElementById("p6").value;
var txt="Bonjour Cicine ! 🧁

━━━━━━━━
🛒 MON PANIER
━━━━━━━━
"+det+"
💰 TOTAL : "+f(tot)+"
━━━━━━━━

👤 "+nom.trim()+"
";
if(tel)txt+="📱 "+tel+"
";
if(dt)txt+="📅 "+dt+"
";
txt+="📍 "+rc+"
";
if(mg)txt+="💬 "+mg+"
";
txt+="
Merci ! 😊";
window.open("https://wa.me/596696111440?text="+encodeURIComponent(txt),"_blank");
}
load();
</script>
<footer>
<div class="flogo">Les D&eacute;lices de Cicine</div>
<div class="flinks">
<a href="#" class="flink">📷 Instagram</a>
<a href="#" class="flink">👍 Facebook</a>
<a href="#" class="flink">🎵 Ticicine</a>
<a href="https://wa.me/596696111440" class="flink" target="_blank">&#128172; WhatsApp</a>
</div>
<p>&#128205; Le Vauclin, Martinique &middot; 0696 11 14 40</p>
<p>&copy; 2025 Les D&eacute;lices de Cicine &mdash; Fait avec &#10084;&#65039;</p>
</footer>
</body></html>
