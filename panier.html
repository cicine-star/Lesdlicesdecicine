<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
:root{--fond:#FBE9E7;--fond2:#F5DCDA;--carte:#FEF1EF;--blanc:#FFFFFF;--bordure:#EDD5D2;--brun:#5C2E0E;--caramel:#A0522D;--c2:#7A3B1E;--texte:#2A1A14;--doux:#6B4C42;--fuchsia:#E8407A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Lato",sans-serif;background:var(--fond);color:var(--texte);font-size:17px;}
nav{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1.5px solid var(--bordure);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 2px 8px rgba(92,46,14,.07);}
.nav-logo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:var(--brun);text-decoration:none;}
.nav-panier{background:var(--caramel);color:#fff;border-radius:30px;padding:8px 16px;font-weight:700;font-size:.8rem;text-decoration:none;}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px;}
.btn{display:block;width:100%;font-weight:700;font-size:.9rem;padding:14px;border-radius:40px;cursor:pointer;border:none;text-align:center;margin-bottom:10px;text-decoration:none;}
.btn-c{background:var(--caramel);color:#fff;}
.btn-b{background:var(--brun);color:#fff;}
.btn-wa{background:#25D366;color:#fff;}
.btn-o{background:transparent;color:var(--brun);border:2px solid var(--brun);}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--caramel);font-weight:700;font-size:.82rem;text-decoration:none;margin-bottom:18px;}
.title{font-family:"Dancing Script",cursive;font-size:2.2rem;color:var(--brun);margin-bottom:4px;}
.sub{font-size:.84rem;color:var(--doux);margin-bottom:18px;}
.fnote{font-size:.72rem;color:var(--caramel);background:var(--carte);border-left:3px solid var(--caramel);padding:7px 10px;border-radius:0 7px 7px 0;margin-bottom:12px;}
footer{background:var(--brun);color:#e8d5c8;padding:28px 16px 20px;text-align:center;margin-top:20px;}
.flogo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:#f0e0d6;margin-bottom:8px;}
footer p{font-size:.77rem;color:#c4a898;margin-bottom:4px;}
.flinks{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:10px 0;}
.flink{color:#e8d5c8;font-size:.75rem;text-decoration:none;background:rgba(255,255,255,.1);padding:5px 12px;border-radius:20px;}

/* Groupe commande */
.groupe{background:#fff;border:1.5px solid var(--bordure);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.groupe-header{background:var(--carte);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;}
.groupe-nom{font-family:"Dancing Script",cursive;font-size:1.2rem;color:var(--brun);}
.groupe-meta{font-size:.74rem;color:var(--doux);margin-top:2px;}
.groupe-del{background:none;border:none;color:#cc4444;font-size:.78rem;cursor:pointer;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid #cc4444;}
.groupe-body{padding:10px 14px 14px;}
.gi{display:flex;justify-content:space-between;align-items:center;font-size:.81rem;padding:5px 0;border-bottom:1px dashed var(--bordure);}
.gi:last-of-type{border-bottom:none;}
.gi-del{background:none;border:none;color:#cc4444;font-size:.7rem;cursor:pointer;margin-left:8px;text-decoration:underline;}
.gsub{display:flex;justify-content:space-between;font-weight:700;font-size:.84rem;color:var(--caramel);margin-top:8px;padding-top:8px;border-top:2px solid var(--bordure);}
.gacompte{display:flex;justify-content:space-between;font-size:.78rem;font-weight:700;color:var(--fuchsia);margin-top:5px;padding:5px 10px;background:#fff5f8;border-radius:8px;border:1px dashed var(--fuchsia);}

/* Total général */
.total-general{background:var(--brun);color:#fff;border-radius:14px 14px 0 0;padding:16px;margin:6px 0 0;display:flex;justify-content:space-between;align-items:center;}
.total-general span:first-child{font-size:.9rem;font-weight:700;}
.total-general span:last-child{font-family:"Dancing Script",cursive;font-size:1.6rem;}
.acompte-general{background:var(--fuchsia);color:#fff;border-radius:0 0 14px 14px;padding:10px 16px;margin:0 0 14px;display:flex;justify-content:space-between;align-items:center;}
.acompte-general span:first-child{font-size:.82rem;font-weight:700;}
.acompte-general span:last-child{font-family:"Dancing Script",cursive;font-size:1.3rem;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Les Douceurs de Cicine</a>
  <a class="nav-panier" href="panier.html">🛒 Panier</a>
</nav>
<div class="wrap">
  <a href="index.html" class="back">← Accueil</a>
  <h2 class="title">Mon panier</h2>
  <p class="sub">Récapitulatif de toutes les commandes</p>
  <div id="panierContent"></div>
</div>

<script>
function f(n){return n.toFixed(2).replace(".",",")+"€";}

function fmtDate(d){
  if(!d) return "";
  var p=d.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

function sauver(g){localStorage.setItem("groupes",JSON.stringify(g));}

function supprimerGroupe(idx){
  if(!confirm("Supprimer toute la commande de ce client ?")) return;
  var g=JSON.parse(localStorage.getItem("groupes")||"[]");
  g.splice(idx,1);
  sauver(g);
  render();
}

function supprimerItem(gIdx,iIdx){
  var g=JSON.parse(localStorage.getItem("groupes")||"[]");
  g[gIdx].items.splice(iIdx,1);
  if(g[gIdx].items.length===0){g.splice(gIdx,1);}
  else{g[gIdx].total=g[gIdx].items.reduce(function(s,x){return s+x.price*x.qty;},0);}
  sauver(g);
  render();
}

function envoyerTout(){
  var g=JSON.parse(localStorage.getItem("groupes")||"[]");
  if(!g.length){alert("Le panier est vide.");return;}

  var msg="Bonjour Cicine ! 🧁\n\n";
  var grandTotal=0;
  for(var i=0;i<g.length;i++){
    var gr=g[i];
    msg+="━━━━━━━━━━━━━━━━━━\n";
    msg+="🧑 "+gr.nom;
    if(gr.date) msg+=" · 📅 "+fmtDate(gr.date);
    msg+="\n";
    msg+=gr.recup+"\n";
    if(gr.tel) msg+="📱 "+gr.tel+"\n";
    msg+="━━━━━━━━━━━━━━━━━━\n";
    for(var j=0;j<gr.items.length;j++){
      var it=gr.items[j];
      var sub=it.price*it.qty;
      msg+="• "+it.qty+"× "+it.name+" = "+f(sub)+"\n";
    }
    msg+="Sous-total : "+f(gr.total)+"\n";
    msg+="💳 Acompte dû (50%) : "+f(gr.total*0.5)+"\n";
    if(gr.note) msg+="💬 "+gr.note+"\n";
    msg+="\n";
    grandTotal+=gr.total;
  }
  msg+="💰 TOTAL GÉNÉRAL : "+f(grandTotal)+"\n";
  msg+="💳 ACOMPTE DÛ (50%) : "+f(grandTotal*0.5)+"\n\nMerci ! 😊";
  window.open("https://wa.me/596696111440?text="+encodeURIComponent(msg),"_blank");
}

function viderPanier(){
  if(!confirm("Vider tout le panier ?")) return;
  localStorage.removeItem("groupes");
  render();
}

function render(){
  var g=JSON.parse(localStorage.getItem("groupes")||"[]");
  var el=document.getElementById("panierContent");

  if(!g.length){
    el.innerHTML='<div style="text-align:center;padding:30px 0;color:var(--doux);">'
      +'<div style="font-size:2.5rem;margin-bottom:10px;">🛒</div>'
      +'<p style="margin-bottom:16px;">Votre panier est vide.</p>'
      +'<a href="commander.html" class="btn btn-c" style="display:inline-block;width:auto;padding:12px 28px;">🧁 Commander</a>'
      +'</div>';
    return;
  }

  var html='<div class="fnote">💬 Aucun paiement sur le site — lien SumUp envoyé après échange WhatsApp</div>';

  var grandTotal=0;
  for(var i=0;i<g.length;i++){
    var gr=g[i];
    grandTotal+=gr.total;
    html+='<div class="groupe">';
    html+='<div class="groupe-header">';
    html+='<div>';
    html+='<div class="groupe-nom">👤 '+gr.nom+'</div>';
    var meta='';
    if(gr.date) meta+='📅 '+fmtDate(gr.date)+'  ';
    meta+=gr.recup;
    if(gr.tel) meta+='  📱 '+gr.tel;
    html+='<div class="groupe-meta">'+meta+'</div>';
    html+='</div>';
    html+='<button class="groupe-del" onclick="supprimerGroupe('+i+')">✕ Supprimer</button>';
    html+='</div>';
    html+='<div class="groupe-body">';
    for(var j=0;j<gr.items.length;j++){
      var it=gr.items[j];
      var sub=it.price*it.qty;
      html+='<div class="gi">'
        +'<span>'+it.qty+'× '+it.name+'</span>'
        +'<span style="display:flex;align-items:center;gap:6px;">'
        +'<strong style="color:var(--caramel);">'+f(sub)+'</strong>'
        +'<button class="gi-del" onclick="supprimerItem('+i+','+j+')">retirer</button>'
        +'</span>'
        +'</div>';
    }
    if(gr.note){
      html+='<p style="font-size:.74rem;color:var(--doux);margin-top:6px;font-style:italic;">💬 '+gr.note+'</p>';
    }
    html+='<div class="gsub"><span>Sous-total</span><span>'+f(gr.total)+'</span></div>';
    html+='<div class="gacompte"><span>💳 Acompte dû (50%)</span><span>'+f(gr.total*0.5)+'</span></div>';
    html+='</div></div>';
  }

  html+='<div class="total-general">'
    +'<span>💰 Total général ('+g.length+' commande'+(g.length>1?'s':'')+')</span>'
    +'<span>'+f(grandTotal)+'</span>'
    +'</div>'
    +'<div class="acompte-general">'
    +'<span>💳 Acompte dû (50%)</span>'
    +'<span>'+f(grandTotal*0.5)+'</span>'
    +'</div>';

  html+='<button class="btn btn-wa" onclick="envoyerTout()">📱 Envoyer tout sur WhatsApp</button>';
  html+='<a href="commander.html" class="btn btn-b">➕ Ajouter une commande</a>';
  html+='<button class="btn btn-o" onclick="viderPanier()" style="font-size:.8rem;padding:10px;">🗑️ Vider le panier</button>';

  el.innerHTML=html;
}

render();
</script>

  </div>

</footer>

</body>
