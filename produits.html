<style>
:root{--fond:#FBE9E7;--fond2:#F5DCDA;--carte:#FEF1EF;--blanc:#FFFFFF;--bordure:#EDD5D2;--brun:#5C2E0E;--caramel:#A0522D;--c2:#7A3B1E;--texte:#2A1A14;--doux:#6B4C42;--fuchsia:#E8407A;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Lato",sans-serif;background:var(--fond);color:var(--texte);font-size:17px;}
nav{position:sticky;top:0;z-index:99;background:#fff;border-bottom:1.5px solid var(--bordure);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;box-shadow:0 2px 8px rgba(92,46,14,.07);}
.nav-logo{font-family:"Dancing Script",cursive;font-size:1.4rem;color:var(--brun);text-decoration:none;}
.nav-panier{background:var(--caramel);color:#fff;border-radius:30px;padding:8px 16px;font-weight:700;font-size:.8rem;text-decoration:none;}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px;}
.btn{display:block;width:100%;font-weight:700;font-size:.9rem;padding:14px;border-radius:40px;cursor:pointer;border:none;text-align:center;margin-bottom:10px;text-decoration:none;}
.btn-c{background:var(--caramel);color:#fff;}
.back{display:inline-flex;align-items:center;gap:5px;color:var(--caramel);font-weight:700;font-size:.82rem;text-decoration:none;margin-bottom:18px;}
.title{font-family:"Dancing Script",cursive;font-size:2.2rem;color:var(--brun);margin-bottom:4px;}
.sub{font-size:.84rem;color:var(--doux);margin-bottom:18px;}
@media(max-width:400px){.fgr{grid-template-columns:1fr;}}
</style>
<style>
.ac{background:#fff;border:1.5px solid var(--bordure);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.ah{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;}
.ah:hover{background:var(--carte);}
.al{display:flex;align-items:center;gap:10px;}
.ae{font-size:1.2rem;}
.at{font-family:"Dancing Script",cursive;font-size:1.3rem;color:var(--brun);}
.as{font-size:.72rem;color:var(--doux);}
.aa{color:var(--caramel);transition:transform .3s;}
.ac.open .aa{transform:rotate(180deg);}
.ab{display:none;padding:0 16px 16px;}
.ac.open .ab{display:block;}
.np{font-size:.73rem;color:var(--caramel);background:var(--carte);border-left:3px solid var(--caramel);padding:6px 10px;border-radius:0 7px 7px 0;margin-bottom:10px;}
.p2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.st{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--doux);margin-bottom:7px;margin-top:6px;}
.pr{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0;border-bottom:1px dashed var(--bordure);}
.pr:last-child{border-bottom:none;}
.pp{font-weight:700;color:var(--caramel);}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.bc{background:var(--carte);border:1px solid var(--bordure);border-radius:10px;padding:12px;}
.bc h4{font-family:"Dancing Script",cursive;font-size:1.1rem;color:var(--brun);margin-bottom:3px;}
.bpt{font-weight:700;color:var(--caramel);font-size:.8rem;margin-bottom:7px;}
.bc ul{list-style:none;}
.bc ul li{font-size:.76rem;color:var(--doux);padding:2px 0 2px 10px;position:relative;}
.bc ul li::before{content:"·";position:absolute;left:0;color:var(--fuchsia);}
@media(max-width:400px){.p2,.bg{grid-template-columns:1fr;}}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
function ac(h){h.parentElement.classList.toggle("open");}
var SB_URL="https://uousxxvrgcyvyaahdtda.supabase.co";
var SB_KEY="sb_publishable_MhxgfdKYdDI6NHLszuXl5A_3B4sOplm";
var sbP=supabase.createClient(SB_URL,SB_KEY);
var CAT_CFG={
  'Viennoiseries salées':       {emoji:'🩷',sub:'Salé · Min. 72h · selon disponibilité'},
  'Viennoiseries sucrées':      {emoji:'🩷',sub:'Sucré · Min. 72h · selon disponibilité'},
  'Mignardises salées':         {emoji:'🩷',sub:'Min. 72h · selon disponibilité'},
  'Mignardises sucrées':        {emoji:'🩷',sub:'Min. 72h · selon disponibilité'},
  'Gâteaux & Créations':        {emoji:'🩷',sub:'Sur mesure · Min. 1 semaine'},
  'Tartes & Tartelettes salées':{emoji:'🩷',sub:'Min. 72h · selon disponibilité'},
  'Délibox':                    {emoji:'🩷',sub:'Coffrets · Min. 1 semaine'},
  'Chocolat & Pain au beurre':  {emoji:'🩷',sub:'Min. 72h · selon disponibilité'},
  'Autres délices gourmands':   {emoji:'🩷',sub:'Min. 72h · selon disponibilité'}
};
var CAT_ORDER=['Viennoiseries salées','Viennoiseries sucrées','Mignardises salées','Mignardises sucrées','Gâteaux & Créations','Tartes & Tartelettes salées','Délibox','Chocolat & Pain au beurre','Autres délices gourmands'];
var APD=['Gâteaux & Créations','Tartes & Tartelettes salées'];
async function loadProduits(){
  try{
    var {data,error}=await sbP.from("products").select("*").order("sort_order").order("name");
    if(error){
      document.getElementById("prodSection").innerHTML='<p style="text-align:center;padding:20px;color:#c0392b;font-size:.82rem;">Erreur Supabase : '+error.message+'</p>';
      return;
    }
    if(!data||!data.length){
      document.getElementById("prodSection").innerHTML='<p style="text-align:center;padding:20px;color:#c0392b;font-size:.82rem;">Accès refusé ou table vide — vérifiez les droits Supabase (RLS).</p>';
      return;
    }
    data=data.filter(function(p){return p.available!==false;});
    if(!data.length){
      document.getElementById("prodSection").innerHTML='<p style="text-align:center;padding:20px;color:var(--doux);font-size:.82rem;">Aucun produit disponible pour le moment.</p>';
      return;
    }
    var seen={};
    data=data.filter(function(p){if(seen[p.name])return false;seen[p.name]=true;return true;});
    var cats={};
    data.forEach(function(p){var c=p.category||"Autre";if(!cats[c])cats[c]=[];cats[c].push(p);});
    var ordered=[];
    CAT_ORDER.forEach(function(c){if(cats[c])ordered.push(c);});
    Object.keys(cats).forEach(function(c){if(CAT_ORDER.indexOf(c)<0)ordered.push(c);});
    var html="";
    ordered.forEach(function(cat){
      var cfg=CAT_CFG[cat]||{emoji:'🩷',sub:''};
      var prods=cats[cat];
      var aP=APD.indexOf(cat)>=0;
      html+='<div class="ac"><div class="ah" onclick="ac(this)">';
      html+='<div class="al"><span class="ae">'+cfg.emoji+'</span>';
      html+='<div><div class="at">'+cat+'</div><div class="as">'+cfg.sub+'</div></div></div>';
      html+='<span class="aa">&#9660;</span></div><div class="ab">';
      prods.forEach(function(p){
        var price=parseFloat(p.price||0);
        var ps=(price%1===0?price.toFixed(0):price.toFixed(2)).replace('.',',')+'€';
        if(aP)ps='à partir de '+ps;
        html+='<div class="pr"><span>'+p.name+'</span><span class="pp">'+ps+'</span></div>';
        if(p.description)html+='<div style="font-size:.71rem;color:var(--doux);padding:1px 0 5px 0;">'+p.description+'</div>';
      });
      html+='</div></div>';
    });
    document.getElementById("prodSection").innerHTML=html;
  }catch(e){
    document.getElementById("prodSection").innerHTML='<p style="text-align:center;padding:20px;color:#c0392b;font-size:.82rem;">Erreur de chargement : '+e.message+'</p>';
  }
}
loadProduits();
</script>
