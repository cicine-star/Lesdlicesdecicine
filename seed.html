var MP=[

var EMB=[
  {name:"Boîtes individuelles S (mignardises)",unit:"unité",current_qty:100,min_qty:30,unit_cost:0.35,category:"emballage"},
  {name:"Boîtes M (4-6 pièces)",unit:"unité",current_qty:50,min_qty:15,unit_cost:0.55,category:"emballage"},
  {name:"Boîtes L (Box Anniversaire / Brunch)",unit:"unité",current_qty:20,min_qty:5,unit_cost:1.20,category:"emballage"},
  {name:"Sacs kraft S",unit:"unité",current_qty:100,min_qty:30,unit_cost:0.12,category:"emballage"},
  {name:"Sacs kraft M",unit:"unité",current_qty:50,min_qty:15,unit_cost:0.18,category:"emballage"},
  {name:"Verrines transparentes (pots 100mL)",unit:"unité",current_qty:40,min_qty:15,unit_cost:0.25,category:"emballage"},

  {name:"Étiquettes personnalisées (logo Cicine)",unit:"unité",current_qty:200,min_qty:50,unit_cost:0.08,category:"emballage"},
  {name:"Rubans décoratifs",unit:"m",current_qty:10,min_qty:3,unit_cost:0.30,category:"emballage"},
  {name:"Sachets zip transparents",unit:"unité",current_qty:50,min_qty:20,unit_cost:0.10,category:"emballage"},
];

var ALL=MP.concat(EMB);
var done=0;
var total=ALL.length;

function log(msg){
  var el=document.getElementById("log");
  el.innerHTML+='<div>'+msg+'</div>';
  el.scrollTop=el.scrollHeight;
}

function setProgress(n){
  done=n;
  var pct=Math.round(n/total*100);
  document.getElementById("bar").style.width=pct+"%";
  document.getElementById("pct").textContent=n+" / "+total;
}

async function run(){
  log("🔍 Vérification de la base de données…");

  // Check if table exists and if items already present
  var {data:existing,error:existErr}=await sb.from("stock_items").select("id").limit(1);
  if(existErr&&existErr.code==="42P01"){
    document.getElementById("errMsg").style.display="block";
    document.getElementById("errMsg").textContent="❌ La table stock_items n'existe pas encore. Crée-la d'abord dans Supabase (voir stocks.html pour le SQL).";
    return;
  }
  if(existing&&existing.length>0){
    log("⚠️ Des articles existent déjà. Ajout des nouveaux uniquement…");
    var {data:names}=await sb.from("stock_items").select("name");
    var existingNames=new Set((names||[]).map(function(r){return r.name;}));
    ALL=ALL.filter(function(item){return !existingNames.has(item.name);});
    total=ALL.length;
    if(total===0){
      log("✅ Tous les articles sont déjà présents !");
      document.getElementById("doneMsgOk").style.display="block";
      return;
    }
    log("➕ "+total+" article(s) à ajouter…");
    document.getElementById("pct").textContent="0 / "+total;
  } else {
    log("✅ Table vide — ajout de "+total+" articles…");
  }

  for(var i=0;i<ALL.length;i++){
    var item=ALL[i];
    var {error}=await sb.from("stock_items").insert({
      name:item.name,
      unit:item.unit,
      current_qty:item.current_qty,
      min_qty:item.min_qty,
      unit_cost:item.unit_cost,
      category:item.category
    });
    if(error){
      log("❌ Erreur sur "+item.name+": "+error.message);
    } else {
      var icon=item.category==="emballage"?"📦":"🌾";
      log(icon+" "+item.name+" — OK");
    }
    setProgress(i+1);
    await new Promise(function(r){setTimeout(r,120);});
  }

  log("🎉 Terminé !");
  document.getElementById("doneMsgOk").style.display="block";
}

window.addEventListener("load",run);
</script>
